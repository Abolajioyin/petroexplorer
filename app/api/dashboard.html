<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetroExplorer Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: Arial, sans-serif; padding: 20px; }
        h1 { color: #10b981; margin-bottom: 8px; font-size: 28px; }
        p { color: #888; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; }
        .card h3 { color: #10b981; margin-bottom: 15px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; text-align: center; }
        .stat .value { font-size: 28px; font-weight: bold; color: #10b981; }
        .stat .label { font-size: 12px; color: #888; margin-top: 5px; }
        select { background: #222; color: #fff; border: 1px solid #333; padding: 8px 12px; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>🛢️ PetroExplorer</h1>
    <p>Oil & Gas Data Exploration API — Built by Abolaji Habeeb Oyinloye</p>

    <div class="stats" id="stats">
        <div class="stat"><div class="value" id="total-oil">—</div><div class="label">Total Oil (bbl)</div></div>
        <div class="stat"><div class="value" id="total-gas">—</div><div class="label">Total Gas (mcf)</div></div>
        <div class="stat"><div class="value" id="top-well">—</div><div class="label">Top Producing Well</div></div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Production Decline Curve</h3>
            <select id="well-select" onchange="loadDeclineChart()">
                <option value="W-001">W-001</option>
                <option value="W-002">W-002</option>
                <option value="W-003">W-003</option>
                <option value="W-004">W-004</option>
                <option value="W-005">W-005</option>
            </select>
            <div id="decline-chart"></div>
        </div>
        <div class="card">
            <h3>Top Wells by Production</h3>
            <div id="wells-chart"></div>
        </div>
        <div class="card" style="grid-column: span 2">
            <h3>Reservoir Properties — Porosity vs Permeability</h3>
            <div id="reservoir-chart"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000/api';

        async function loadStats() {
            const res = await fetch(`${API}/production/summary`);
            const data = await res.json();
            document.getElementById('total-oil').textContent = data.total_oil_bbl.toLocaleString();
            document.getElementById('total-gas').textContent = data.total_gas_mcf.toLocaleString();
            document.getElementById('top-well').textContent = data.top_producing_well;
        }

        async function loadDeclineChart() {
            const wellId = document.getElementById('well-select').value;
            const res = await fetch(`${API}/charts/production-decline?well_id=${wellId}`);
            const data = await res.json();
            Plotly.newPlot('decline-chart', data.data, data.layout);
        }

        async function loadWellsChart() {
            const res = await fetch(`${API}/charts/production-by-well`);
            const data = await res.json();
            Plotly.newPlot('wells-chart', data.data, data.layout);
        }

        async function loadReservoirChart() {
            const res = await fetch(`${API}/charts/reservoir-properties`);
            const data = await res.json();
            Plotly.newPlot('reservoir-chart', data.data, data.layout);
        }

        loadStats();
        loadDeclineChart();
        loadWellsChart();
        loadReservoirChart();
    </script>
</body>
</html>
